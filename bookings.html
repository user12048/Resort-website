<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bookings - Sun Beach Palace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">
        <img src="images/logo.svg" alt="Sun Beach Palace logo" class="logo">
        <span class="brand-name">Sun Beach Palace</span>
      </a>

      <nav class="primary-nav">
        <ul class="main-nav">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="rooms.html">Rooms</a></li>
          <li><a href="activities.html">Activities</a></li>
          <li><a href="resto.html">Restaurants</a></li>
          <li><a href="review.html">Review</a></li>
        </ul>
      </nav>

      <a href="bookings.html" class="cta-button">Book Now</a>
    </div>
  </header>

  <main>
    <h2>Bookings</h2>
    <section class="booking-section">
      <div class="booking-card">
        <h3>Pick your room</h3>
        <form id="booking-form">
          <div class="room-option">
            <input type="radio" id="standard-room-2" name="room" value="Standard Room for 2" data-price="550" checked>
            <label for="standard-room-2">
              <strong>Standard Room for 2</strong>
              <span>A comfortable retreat for two with a cozy queen bed and bright seaside style.</span>
              <strong>$550 / night</strong>
            </label>
          </div>
          <div class="room-option">
            <input type="radio" id="standard-room-4" name="room" value="Standard Room for 4" data-price="1000">
            <label for="standard-room-4">
              <strong>Standard Room for 4</strong>
              <span>A cheerful room for four with two double beds and plenty of space to relax.</span>
              <strong>$1000 / night</strong>
            </label>
          </div>
          <div class="room-option">
            <input type="radio" id="luxury-room-2" name="room" value="Luxury Room for 2" data-price="1750">
            <label for="luxury-room-2">
              <strong>Luxury Room for 2</strong>
              <span>A stylish room for two with soft linens, a cozy seating nook, and extra comforts.</span>
              <strong>$1750 / night</strong>
            </label>
          </div>
          <div class="room-option">
            <input type="radio" id="luxury-room-4" name="room" value="Luxury Room for 4" data-price="3400">
            <label for="luxury-room-4">
              <strong>Luxury Room for 4</strong>
              <span>A spacious luxury room with elegant details and ample space for four guests.</span>
              <strong>$3400 / night</strong>
            </label>
          </div>
          <div class="room-option">
            <input type="radio" id="suite" name="room" value="Suite" data-price="6000">
            <label for="suite">
              <strong>Suite</strong>
              <span>A beautifully appointed suite with a separate lounge, large bathroom, and scenic views.</span>
              <strong>$6000 / night</strong>
            </label>
          </div>
          <div class="booking-fields">
            <label>
              Nights
              <input type="number" id="room-nights" min="1" value="1">
            </label>
            <label>
              Guests
              <input type="number" id="room-guests" min="1" value="1">
            </label>
          </div>
          <button type="button" id="add-to-payment">Add to payment</button>
        </form>
      </div>

      <aside class="payment-summary">
        <h3>Payment</h3>
        <div id="payment-items" class="payment-items">No rooms added yet.</div>
        <div class="payment-total">Total: $<span id="payment-total">0</span></div>
        <button type="button" id="checkout-button" disabled>Checkout</button>
        <p class="payment-note">This is a demo summary — no real payment is taken.</p>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
