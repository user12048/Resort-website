        <li><a href="resto-reservation.html">Reservation</a></li>
      </ul>

    <section class="restaurant restaurant-right">
      <div class="restaurant-text2">
        <h3>Reserve a table</h3>
        <p>Fill out the form to reserve a table at our restaurant. We will confirm availability as soon as possible.</p>
        <form action="#" method="post" class="reservation-form">
          <label>Name:<br><input type="text" name="name" required></label><br>
          <label>Room:<br><input type="text" name="room" required></label><br>
          <label>Date and time:<br><input type="datetime-local" name="datetime" required></label><br>
          <label>Number of people:<br><input type="number" name="people" min="1" max="20" value="2" required></label><br>
          <label>Notes:<br><textarea name="notes"></textarea></label><br>
          <button type="submit">Send reservation</button>
        </form>
      </div>
      <div class="restaurant-image2">
        <img src="images/téléchargement (5).jpeg" alt="Reservation image">
      </div>
    </section>
  </main>
